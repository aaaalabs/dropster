<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dropster — Block Battle Arena</title>
  <meta name="description" content="Competitive 1v1 Tetris. Challenge your family. No download needed.">
  <!-- Open Graph -->
  <meta property="og:title" content="Dropster — Block Battle Arena">
  <meta property="og:description" content="Competitive 1v1 Tetris. Challenge your family. No download needed.">
  <meta property="og:image" content="/og-image.svg">
  <meta property="og:type" content="website">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Dropster — Block Battle Arena">
  <meta name="twitter:description" content="Competitive 1v1 Tetris. Challenge your family.">
  <meta name="twitter:image" content="/og-image.svg">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00f0f0">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cyan: #00f0f0;
      --magenta: #ff00aa;
      --purple: #a855f7;
      --dark: #050510;
      --darker: #020208;
      --surface: #0a0a1a;
      --surface-light: #12122a;
      --text-dim: #4a4a6a;
      --text-mid: #8888aa;
      --glow-cyan: 0 0 20px rgba(0, 240, 240, 0.3), 0 0 60px rgba(0, 240, 240, 0.1);
      --glow-magenta: 0 0 20px rgba(255, 0, 170, 0.3), 0 0 60px rgba(255, 0, 170, 0.1);
      --font-display: 'Orbitron', sans-serif;
      --font-body: 'Rajdhani', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--darker);
      color: #fff;
      font-family: var(--font-body);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(var(--dark) 1px, transparent 1px),
        linear-gradient(90deg, var(--dark) 1px, transparent 1px);
      background-size: 40px 40px;
      background-position: center center;
      opacity: 0.4;
      animation: gridPulse 8s ease-in-out infinite;
      pointer-events: none;
    }

    /* Corner glow accents */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 0% 0%, rgba(0, 240, 240, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(255, 0, 170, 0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    @keyframes gridPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.5; }
    }

    #app {
      position: relative;
      z-index: 1;
    }

    /* Lobby styles */
    .lobby {
      text-align: center;
      padding: clamp(24px, 6vw, 60px) clamp(16px, 4vw, 40px);
      max-width: 100vw;
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes glitchFlicker {
      0%, 94%, 100% { opacity: 1; }
      95% { opacity: 0.8; transform: translateX(-2px); }
      96% { opacity: 1; transform: translateX(2px); }
      97% { opacity: 0.9; transform: translateX(0); }
    }

    .lobby-title {
      font-family: var(--font-display);
      font-size: clamp(32px, 8vw, 52px);
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--cyan);
      text-shadow: var(--glow-cyan);
      margin-bottom: 4px;
      animation: glitchFlicker 6s ease-in-out infinite;
      position: relative;
    }

    .lobby-title::after {
      content: 'DROPSTER';
      position: absolute;
      inset: 0;
      color: var(--magenta);
      text-shadow: var(--glow-magenta);
      clip-path: polygon(0 60%, 100% 60%, 100% 65%, 0 65%);
      animation: glitchSlice 4s ease-in-out infinite;
    }

    @keyframes glitchSlice {
      0%, 90%, 100% { transform: translateX(0); }
      92% { transform: translateX(4px); }
      94% { transform: translateX(-3px); }
      96% { transform: translateX(0); }
    }

    .lobby-subtitle {
      font-family: var(--font-body);
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: clamp(32px, 8vw, 56px);
    }

    .lobby-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: min(280px, 85vw);
      margin: 0 auto;
    }

    .lobby-btn {
      position: relative;
      padding: 14px 20px;
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      overflow: hidden;
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .lobby-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .lobby-btn:hover::before {
      opacity: 1;
    }

    .lobby-btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: var(--cyan);
      color: var(--darker);
      box-shadow: var(--glow-cyan);
    }

    .btn-primary::before {
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    }

    .btn-primary:hover {
      box-shadow: 0 0 30px rgba(0, 240, 240, 0.5), 0 0 80px rgba(0, 240, 240, 0.2);
    }

    .btn-secondary {
      background: var(--magenta);
      color: #fff;
      box-shadow: var(--glow-magenta);
    }

    .btn-secondary:hover {
      box-shadow: 0 0 30px rgba(255, 0, 170, 0.5), 0 0 80px rgba(255, 0, 170, 0.2);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-mid);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-ghost:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.03);
    }

    .join-row {
      display: flex;
      gap: 8px;
    }

    .code-input {
      flex: 1;
      min-width: 0;
      padding: 14px;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-align: center;
      text-transform: uppercase;
      background: var(--surface);
      color: var(--cyan);
      border: 1px solid rgba(0, 240, 240, 0.15);
      outline: none;
      transition: all 0.2s;
    }

    .code-input::placeholder {
      color: var(--text-dim);
      font-weight: 400;
      letter-spacing: 0.15em;
      font-size: 14px;
    }

    .code-input:focus {
      border-color: rgba(0, 240, 240, 0.4);
      box-shadow: inset 0 0 20px rgba(0, 240, 240, 0.05);
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
      margin: 8px 0;
    }

    .lobby-status {
      margin-top: 28px;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 400;
      color: var(--text-mid);
      padding: 0 16px;
      min-height: 24px;
    }

    .lobby-status.has-code {
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--cyan);
      text-shadow: 0 0 10px rgba(0, 240, 240, 0.3);
    }

    /* Room code display */
    .room-code-display {
      display: inline-block;
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 0.5em;
      padding: 12px 24px;
      margin-top: 8px;
      background: var(--surface);
      border: 1px solid rgba(0, 240, 240, 0.2);
      color: var(--cyan);
      text-shadow: var(--glow-cyan);
      animation: codePulse 2s ease-in-out infinite;
    }

    @keyframes codePulse {
      0%, 100% { box-shadow: 0 0 10px rgba(0, 240, 240, 0.1); }
      50% { box-shadow: 0 0 25px rgba(0, 240, 240, 0.2); }
    }

    .controls-hint {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .controls-hint p {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    /* Game Over Overlay */
    .gameover-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 2, 8, 0.92);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      animation: fadeIn 0.3s ease;
      backdrop-filter: blur(8px);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .gameover-content {
      text-align: center;
      animation: scaleIn 0.4s ease-out;
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .gameover-title {
      font-family: var(--font-display);
      font-size: clamp(36px, 10vw, 64px);
      font-weight: 900;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .gameover-title.win {
      color: var(--cyan);
      text-shadow: var(--glow-cyan);
    }

    .gameover-title.lose {
      color: var(--magenta);
      text-shadow: var(--glow-magenta);
    }

    .gameover-score {
      font-family: var(--font-display);
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 400;
      color: var(--text-mid);
      margin-bottom: 40px;
      letter-spacing: 0.1em;
    }

    .gameover-score span {
      color: #fff;
      font-weight: 700;
    }

    /* Mute button */
    .mute-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 10;
      background: rgba(10, 10, 26, 0.7);
      color: var(--text-mid);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    .mute-btn:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
