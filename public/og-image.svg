<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#020208"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grid)" opacity="0.3"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0a0a2a" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Glow circles -->
  <circle cx="200" cy="100" r="300" fill="#00f0f0" opacity="0.04"/>
  <circle cx="1000" cy="530" r="250" fill="#ff00aa" opacity="0.03"/>
  <!-- Tetromino blocks -->
  <g opacity="0.6">
    <rect x="150" y="340" width="50" height="50" rx="6" fill="#00f0f0"/>
    <rect x="200" y="340" width="50" height="50" rx="6" fill="#00f0f0"/>
    <rect x="250" y="340" width="50" height="50" rx="6" fill="#00f0f0"/>
    <rect x="300" y="340" width="50" height="50" rx="6" fill="#00f0f0"/>
    <rect x="850" y="280" width="50" height="50" rx="6" fill="#a000f0"/>
    <rect x="900" y="280" width="50" height="50" rx="6" fill="#a000f0"/>
    <rect x="900" y="330" width="50" height="50" rx="6" fill="#a000f0"/>
    <rect x="950" y="330" width="50" height="50" rx="6" fill="#a000f0"/>
    <rect x="950" y="420" width="50" height="50" rx="6" fill="#f0f000"/>
    <rect x="1000" y="420" width="50" height="50" rx="6" fill="#f0f000"/>
    <rect x="950" y="470" width="50" height="50" rx="6" fill="#f0f000"/>
    <rect x="1000" y="470" width="50" height="50" rx="6" fill="#f0f000"/>
  </g>
  <!-- Title -->
  <text x="600" y="260" text-anchor="middle" fill="#00f0f0" font-family="monospace" font-size="120" font-weight="bold" letter-spacing="15">DROPSTER</text>
  <!-- Subtitle -->
  <text x="600" y="330" text-anchor="middle" fill="#4a4a6a" font-family="monospace" font-size="28" letter-spacing="12">BLOCK BATTLE ARENA</text>
  <!-- CTA -->
  <rect x="420" y="420" width="360" height="60" rx="8" fill="#00f0f0" opacity="0.15"/>
  <rect x="420" y="420" width="360" height="60" rx="8" fill="none" stroke="#00f0f0" stroke-width="1" opacity="0.4"/>
  <text x="600" y="460" text-anchor="middle" fill="#00f0f0" font-family="monospace" font-size="22" letter-spacing="6">PLAY NOW</text>
</svg>
